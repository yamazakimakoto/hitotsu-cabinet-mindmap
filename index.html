// ============================================================
// SVG Mindmap Generator
// ============================================================
function generateMindmapSVG(minister, colors) {
  const cx = 210, cy = 190;
  const r1 = 100; // pillar radius
  const r2 = 170; // leaf radius
  const pillars = minister.pillars;
  const pCount = pillars.length;

  const tc = textOn(colors.main);
  let paths = '';
  let nodes = '';

  // Central node
  nodes += `
    <g class="node-center">
      <circle cx="${cx}" cy="${cy}" r="36" fill="${colors.main}" opacity="0.9"/>
      <text x="${cx}" y="${cy - 6}" text-anchor="middle" fill="${tc}" font-size="12" font-weight="bold">${minister.name}</text>
      <text x="${cx}" y="${cy + 10}" text-anchor="middle" fill="${tc}" font-size="9" opacity="0.8">${minister.role}</text>
    </g>`;

  pillars.forEach((pillar, i) => {
    const angle = (2 * Math.PI * i / pCount) - Math.PI / 2;
    const px = cx + r1 * Math.cos(angle);
    const py = cy + r1 * Math.sin(angle);

    // Main branch (curved)
    const cpx = cx + (r1 * 0.5) * Math.cos(angle + 0.15);
    const cpy = cy + (r1 * 0.5) * Math.sin(angle + 0.15);
    paths += `<path class="branch branch-main" d="M${cx},${cy} Q${cpx},${cpy} ${px},${py}" stroke="${colors.main}"/>`;

    // Pillar node
    const labelLines = splitText(pillar.label, 6);
    let labelSVG = labelLines.map((line, li) =>
      `<text x="${px}" y="${py + (li - (labelLines.length-1)/2) * 12}" text-anchor="middle" font-size="10">${line}</text>`
    ).join('');

    nodes += `
      <g class="node-pillar" data-tooltip="${pillar.label}: ${pillar.proposals.join(' / ')}">
        <circle cx="${px}" cy="${py}" r="25" fill="${colors.main}" opacity="0.20" stroke="${colors.sub}" stroke-width="1.5"/>
        ${labelSVG}
      </g>`;

    // Leaf nodes
    const proposals = pillar.proposals;
    const leafSpread = Math.PI * 0.35;
    proposals.forEach((prop, j) => {
      const leafAngle = angle - leafSpread/2 + (leafSpread * j / Math.max(proposals.length - 1, 1));
      const lx = cx + r2 * Math.cos(leafAngle);
      const ly = cy + r2 * Math.sin(leafAngle);

      const lcpx = px + (r2 - r1) * 0.4 * Math.cos(leafAngle + 0.1);
      const lcpy = py + (r2 - r1) * 0.4 * Math.sin(leafAngle + 0.1);
      paths += `<path class="branch branch-sub" d="M${px},${py} Q${lcpx},${lcpy} ${lx},${ly}" stroke="${colors.main}" opacity="0.4"/>`;

      const truncProp = prop.length > 12 ? prop.substring(0, 11) + '..' : prop;
      const tw = Math.max(truncProp.length * 8, 60);
      nodes += `
        <g class="node-leaf" data-tooltip="${prop}">
          <rect x="${lx - tw/2}" y="${ly - 10}" width="${tw}" height="20" fill="${colors.sub}" opacity="0.3"/>
          <text x="${lx}" y="${ly + 4}" text-anchor="middle" font-size="8.5">${truncProp}</text>
        </g>`;
    });
  });

  return `<svg class="mindmap" viewBox="0 0 420 380" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="glow-${minister.name.replace(/\s/g,'')}" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="${colors.main}" stop-opacity="0.1"/>
        <stop offset="100%" stop-color="${colors.main}" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <circle cx="${cx}" cy="${cy}" r="180" fill="url(#glow-${minister.name.replace(/\s/g,'')})" />
    ${paths}
    ${nodes}
  </svg>`;
}

function splitText(text, maxLen) {
  if (text.length <= maxLen) return [text];
  const mid = Math.ceil(text.length / 2);
  return [text.substring(0, mid), text.substring(mid)];
}

// 主色の明度に応じて中央ノードの文字色を白/黒に自動切替（明るいテーマ対応）
function textOn(hex) {
  const c = hex.replace('#','');
  const r = parseInt(c.substr(0,2),16), g = parseInt(c.substr(2,2),16), b = parseInt(c.substr(4,2),16);
  return (0.299*r + 0.587*g + 0.114*b) > 150 ? '#1a1a1a' : '#ffffff';
}

// ============================================================
// Render cards
// ============================================================
function renderCards() {
  Object.entries(ministersData).forEach(([ministryId, ministers]) => {
    const section = document.getElementById(ministryId);
    if (!section) return;
    const grid = section.querySelector('.cards-grid');
    const colors = ministryColors[ministryId];

    ministers.forEach(m => {
      const isMinister = m.role.includes('大臣') && !m.role.includes('副');
      const card = document.createElement('div');
      card.className = `mindmap-card ${isMinister ? 'role-minister' : 'role-vice'}`;

      const svg = generateMindmapSVG(m, colors);
      const keywords = m.keywords.map(k => `<span class="keyword-tag">${k}</span>`).join('');

      card.innerHTML = `
        <span class="role-badge">${m.role}${m.age ? ' (' + m.age + '歳)' : ''}</span>
        <div style="text-align:center;margin-bottom:4px;font-size:11px;color:var(--text-dim)">${m.theme}</div>
        ${svg}
        <div class="keyword-bar">${keywords}</div>
      `;
      grid.appendChild(card);
    });
  });
}

// ============================================================
// Tooltip
// ============================================================
function initTooltip() {
  const tooltip = document.getElementById('tooltip');
  document.addEventListener('mouseover', e => {
    const el = e.target.closest('[data-tooltip]');
    if (el) {
      tooltip.textContent = el.getAttribute('data-tooltip');
      tooltip.style.display = 'block';
    }
  });
  document.addEventListener('mousemove', e => {
    if (tooltip.style.display === 'block') {
      tooltip.style.left = (e.clientX + 12) + 'px';
      tooltip.style.top = (e.clientY + 12) + 'px';
    }
  });
  document.addEventListener('mouseout', e => {
    const el = e.target.closest('[data-tooltip]');
    if (el) tooltip.style.display = 'none';
  });
}

// ============================================================
// Init
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  renderCards();
  initTooltip();
});
